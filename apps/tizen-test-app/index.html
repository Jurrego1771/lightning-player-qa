<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightning QA — Samsung Tizen TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 1920px; height: 1080px; overflow: hidden; }
    #player-container { width: 1920px; height: 1080px; }
  </style>

  <!--
    qa-harness.js debe cargarse PRIMERO — define window.__qa, registra teclas
    Tizen (tvinputdevice) y define window.__initPlayer antes que el player.
  -->
  <script src="qa-harness.js"></script>
  <script src="debug-overlay.js"></script>
</head>
<body>
  <div id="player-container"></div>

  <script>
    // ── Parámetros soportados ──────────────────────────────────────────────────
    //
    // La app recibe parámetros via:
    //   1. Evento 'appcontrol' (tizen.application.getRequestedAppControl) al lanzar
    //      con `tizen run -p <id> -t <device> --args '{"type":"media","id":"..."}'`
    //   2. Query string (hosted mode / debug en browser)
    //   3. Defaults hardcodeados (vodShort en DEV)
    //
    // Parámetros:
    //   type       — 'media' | 'live' | 'dvr' (default: 'media')
    //   id         — content ID de la plataforma Mediastream
    //   autoplay   — boolean (default: true)
    //   env        — 'dev' | 'staging' | 'prod' (default: 'dev')

    var PLAYER_SCRIPTS = {
      dev:     'https://player.cdn.mdstrm.com/lightning_player/develop/api.js',
      staging: 'https://player.cdn.mdstrm.com/lightning_player/staging/api.js',
      prod:    'https://player.cdn.mdstrm.com/lightning_player/api.js',
    }

    var DEFAULT_CONFIG = {
      type:     'media',
      id:       '69d2f1e0461dd502cd921ad6',
      autoplay: true,
    }

    function getQueryParams() {
      var params = {}
      var search = window.location.search.slice(1)
      if (!search) return params
      search.split('&').forEach(function(pair) {
        var kv = pair.split('=')
        if (kv[0]) params[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1] || '')
      })
      return params
    }

    function buildConfig(launchParams) {
      var qp = getQueryParams()
      return {
        type:     launchParams.type     || qp.type     || DEFAULT_CONFIG.type,
        id:       launchParams.id       || qp.id       || DEFAULT_CONFIG.id,
        autoplay: launchParams.autoplay !== undefined
          ? launchParams.autoplay
          : (qp.autoplay === 'false' ? false : DEFAULT_CONFIG.autoplay),
      }
    }

    function loadPlayerScript(env, callback) {
      var url = PLAYER_SCRIPTS[env] || PLAYER_SCRIPTS['dev']
      var script = document.createElement('script')
      script.src = url
      script.onload = callback
      script.onerror = function() {
        window.__qa.initError = 'Error cargando player script desde: ' + url
        window.__qa.errors.push({ message: window.__qa.initError })
      }
      document.head.appendChild(script)
    }

    function initWithConfig(launchParams) {
      var env = launchParams.env || getQueryParams().env || 'dev'
      var config = buildConfig(launchParams)

      loadPlayerScript(env, function() {
        window.__initPlayer(config)
      })
    }

    // ── Leer parámetros de lanzamiento Tizen ──────────────────────────────────
    //
    // Tizen pasa parámetros via appcontrol. El evento 'appcontrol' se dispara
    // tanto al primer launch como al re-launch (equivalente a webOSRelaunch).

    function getTizenLaunchParams() {
      try {
        var app   = tizen.application.getCurrentApplication()
        var reqCtrl = app.getRequestedAppControl()
        if (!reqCtrl || !reqCtrl.appControl || !reqCtrl.appControl.data) return {}
        var params = {}
        reqCtrl.appControl.data.forEach(function(item) {
          params[item.key] = Array.isArray(item.value) ? item.value[0] : item.value
        })
        return params
      } catch (e) {
        return {}
      }
    }

    document.addEventListener('appcontrol', function() {
      var params = getTizenLaunchParams()
      if (window.__player && params.id) {
        // Re-launch con nuevo contenido — reusar instancia
        window.__qa.events  = []
        window.__qa.ready   = false
        window.__player.load({ type: params.type || 'media', id: params.id })
      } else {
        initWithConfig(params)
      }
    })

    // ── Fallback: query string o defaults ─────────────────────────────────────
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (!window.__qa.initialized && !window.__qa.initError) {
          initWithConfig(getTizenLaunchParams())
        }
      }, 500)
    })
  </script>
</body>
</html>

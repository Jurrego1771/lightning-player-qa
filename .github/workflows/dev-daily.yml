name: Dev — Suite Completa (Diario + Push)

# ─── Cuándo corre y qué jobs ───────────────────────────────────────────────
#
#  TRIGGER             smoke  e2e(chr)  e2e(ff/wk)  integ  analytics  a11y  visual  perf
#  ────────────────────────────────────────────────────────────────────────────────
#  PR → main           ✅     —         —           ✅(*)  —          —     —       —
#  push → main         ✅     —         —           —      —          —     —       —
#  schedule Mar-Vie    ✅     ✅        —           ✅(*)  —          ✅    ✅      —
#  schedule Lunes      ✅     ✅        ✅          ✅(*)  —          ✅    ✅      ✅
#  workflow_dispatch   ✅     full      full        full   full       full  full    full
#
#  (*) integration "diaria" excluye las baterías de analytics de terceros
#      Youbora/NPAW + Konodrac (--grep-invert "Youbora|Konodrac"): esos trackers
#      esperan beacons reales (lma.npaw.com, konodrac) → lentos, flaky y poco
#      probables de romper. NO entran en ningún schedule; corren solo bajo
#      demanda con workflow_dispatch → suite=full (job integration-analytics).
#
#  Estrategia: el camino crítico diario (Mar-Vie) baja a ~15-18 min corriendo
#  solo chromium + integración crítica. Los lunes se ejecuta la cobertura completa:
#  cross-browser (firefox/webkit) y performance. Las baterías de analytics
#  (Youbora + Konodrac) quedan fuera de todo schedule: solo workflow_dispatch.

on:
  pull_request:
    branches: [main]        # Smoke + integration en cada PR (feedback pre-merge)
  schedule:
    - cron: '0 12 * * 2-5'  # Mar-Vie 7 AM Colombia — diario ligero (chromium)
    - cron: '0 12 * * 1'    # Lunes 7 AM Colombia — suite completa (cross-browser + perf)
  push:
    branches: [main]        # Solo smoke post-merge (ya validado en PR)
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a correr'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - e2e-only
          - smoke-only

env:
  PLAYER_ENV: dev
  MOCK_VAST_PORT: 9999
  MOCK_VAST_BASE_URL: http://localhost:9999
  PLATFORM_API_URL: https://dev.platform.mediastre.am/api
  CI: true

jobs:
  # ── JOB 1: Smoke rápido (siempre corre primero, falla rápido) ────────────
  smoke:
    name: Smoke — Dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: sudo apt-get install -y ffmpeg

      - name: Smoke tests
        run: npx playwright test tests/smoke/ --project=chromium
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report-dev
          path: playwright-report/
          retention-days: 7

  # ── JOB 2: E2E Chromium (diario — el grueso de la señal de regresión) ─────
  e2e-chromium:
    name: E2E — chromium
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' || github.event.inputs.suite == 'e2e-only' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Los HLS fixtures (vod/audio/vod-with-error) están gitignored y se
      # generan con ffmpeg. Sin esto el global-setup aborta el job.
      - name: Preparar HLS fixtures
        run: |
          sudo apt-get install -y ffmpeg
          npm run fixtures:generate

      - name: E2E tests
        run: npx playwright test tests/e2e/ --project=chromium
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-chromium
          path: playwright-report/
          retention-days: 14

  # ── JOB 3: E2E Cross-Browser (Firefox + WebKit) — solo lunes ─────────────
  # Los bugs específicos de motor son raros; no justifican correr 147 tests ×2
  # navegadores extra todos los días. Cobertura cross-browser semanal (lunes).
  e2e-cross-browser:
    name: E2E — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event.schedule == '0 12 * * 1' || github.event.inputs.suite == 'full' || github.event.inputs.suite == 'e2e-only' }}
    strategy:
      fail-fast: false
      matrix:
        project: [firefox, webkit]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.project }} --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.project }}

      - name: Preparar HLS fixtures
        run: |
          sudo apt-get install -y ffmpeg
          npm run fixtures:generate

      - name: E2E tests
        run: npx playwright test tests/e2e/ --project=${{ matrix.project }}
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

  # ── JOB 4: Integration diaria (excluye analytics de terceros — ver header) ──
  integration:
    name: Integration — Chromium (sin analytics)
    runs-on: ubuntu-latest
    needs: smoke
    # Corre en PRs (feedback pre-merge) y en cualquier schedule.
    # No en push a main: ya fue validado en el PR correspondiente.
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: sudo apt-get install -y ffmpeg

      - name: Integration tests (excluye analytics de terceros)
        run: npx playwright test tests/integration/ --project=chromium --grep-invert "Youbora|Konodrac"
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 5: Analytics de terceros (Youbora + Konodrac) — SOLO manual ──────
  # Estos trackers esperan beacons reales (lma.npaw.com no se puede mockear sin
  # romper Fastdata del SDK; konodrac igual), por lo que son lentos e
  # inherentemente flaky y poco probables de romper. NO entran en ningún
  # schedule (ni diario ni lunes); solo se corren bajo demanda con
  # workflow_dispatch → suite=full.
  integration-analytics:
    name: Integration — Analytics (Youbora + Konodrac)
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: sudo apt-get install -y ffmpeg

      - name: Analytics tests (Youbora + Konodrac)
        run: npx playwright test tests/integration/ --project=chromium --grep "Youbora|Konodrac"
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analytics-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 6: Accessibility (diario) ────────────────────────────────────────
  accessibility:
    name: Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Preparar HLS fixtures
        run: |
          sudo apt-get install -y ffmpeg
          npm run fixtures:generate

      - run: npx playwright test tests/a11y/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 7: Visual Regression (diario) ────────────────────────────────────
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Preparar HLS fixtures
        run: |
          sudo apt-get install -y ffmpeg
          npm run fixtures:generate

      - run: npx playwright test tests/visual/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-diff
          path: test-results/
          retention-days: 14

  # ── JOB 8: Performance / QoE — solo lunes + workflow_dispatch full ────────
  # El QoE no cambia día a día; cobertura semanal es suficiente.
  performance:
    name: QoE Metrics
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event.schedule == '0 12 * * 1' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Preparar HLS fixtures
        run: |
          sudo apt-get install -y ffmpeg
          npm run fixtures:generate

      - name: Run performance tests
        run: npx playwright test tests/performance/ --project=performance
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      # Compara contra baseline commiteado. Falla el job si alguna métrica
      # empeoró > 20% respecto al baseline. Si el baseline está vacío (primera
      # ejecución), el script hace exit 0 y no bloquea CI.
      # Para actualizar el baseline: npm run perf:update-baseline + commit.
      - name: Compare against performance baseline
        run: npm run perf:compare

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qoe-report-${{ github.run_number }}
          path: |
            playwright-report/
            perf-results/current-run.json
          retention-days: 30

  # ── Notificación de resultados ────────────────────────────────────────────
  notify-results:
    name: Notificar Resultados
    runs-on: ubuntu-latest
    needs: [smoke, e2e-chromium, e2e-cross-browser, integration, accessibility, visual, performance]
    if: always() && github.event_name == 'schedule'
    # secrets no puede usarse en condiciones if: — se promueve a env del job
    # para poder evaluarlo en el paso de Slack.
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
    steps:
      - name: Evaluar resultado global
        run: |
          SMOKE="${{ needs.smoke.result }}"
          E2E_CHR="${{ needs.e2e-chromium.result }}"
          E2E_XB="${{ needs.e2e-cross-browser.result }}"
          INTEGRATION="${{ needs.integration.result }}"
          PERFORMANCE="${{ needs.performance.result }}"
          ACCESSIBILITY="${{ needs.accessibility.result }}"
          VISUAL="${{ needs.visual.result }}"

          # skipped (jobs que solo corren lunes) NO cuenta como fallo.
          if [[ "$SMOKE" == "failure" || "$E2E_CHR" == "failure" || "$E2E_XB" == "failure" || "$INTEGRATION" == "failure" || "$PERFORMANCE" == "failure" ]]; then
            echo "RESULT=failure" >> $GITHUB_ENV
            echo "ICON=❌" >> $GITHUB_ENV
          else
            echo "RESULT=success" >> $GITHUB_ENV
            echo "ICON=✅" >> $GITHUB_ENV
          fi

          echo "SMOKE_R=$SMOKE"               >> $GITHUB_ENV
          echo "E2E_CHR_R=$E2E_CHR"           >> $GITHUB_ENV
          echo "E2E_XB_R=$E2E_XB"             >> $GITHUB_ENV
          echo "INTEGRATION_R=$INTEGRATION"   >> $GITHUB_ENV
          echo "PERFORMANCE_R=$PERFORMANCE"   >> $GITHUB_ENV
          echo "ACCESSIBILITY_R=$ACCESSIBILITY" >> $GITHUB_ENV
          echo "VISUAL_R=$VISUAL"             >> $GITHUB_ENV

      - name: Notificar Slack
        if: ${{ env.SLACK_WEBHOOK != '' }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"${{ env.ICON }} *QA Dev — Suite Diaria* (<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_number }}>)\",
              \"attachments\": [{
                \"color\": \"$([ '${{ env.RESULT }}' = 'success' ] && echo 'good' || echo 'danger')\",
                \"fields\": [
                  {\"title\": \"Smoke\",        \"value\": \"${{ env.SMOKE_R }}\",        \"short\": true},
                  {\"title\": \"E2E chromium\", \"value\": \"${{ env.E2E_CHR_R }}\",      \"short\": true},
                  {\"title\": \"E2E ff/wk\",    \"value\": \"${{ env.E2E_XB_R }}\",       \"short\": true},
                  {\"title\": \"Integration\",  \"value\": \"${{ env.INTEGRATION_R }}\",  \"short\": true},
                  {\"title\": \"A11y\",         \"value\": \"${{ env.ACCESSIBILITY_R }}\",\"short\": true},
                  {\"title\": \"Visual\",       \"value\": \"${{ env.VISUAL_R }}\",       \"short\": true},
                  {\"title\": \"Performance\",  \"value\": \"${{ env.PERFORMANCE_R }}\",  \"short\": true}
                ]
              }]
            }"

name: Dev — Suite Completa (Diario + Push)

# ─── Cuándo corre ──────────────────────────────────────────────────────────
#
#  1. Diariamente a las 07:00 AM Colombia (UTC-5 = 12:00 UTC)
#     → Suite completa contra develop branch del player
#
#  2. En cada push a main de ESTE repo QA
#     → Suite E2E rápida para validar que los tests en sí no están rotos
#
#  3. Manual via workflow_dispatch
#     → Útil para correr a demanda sin esperar el cron

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 7 AM Colombia, Lunes a Viernes
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a correr'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - e2e-only
          - smoke-only

env:
  PLAYER_ENV: dev
  MOCK_VAST_PORT: 9999
  MOCK_VAST_BASE_URL: http://localhost:9999
  CI: true

jobs:
  # ── JOB 1: Smoke rápido (siempre corre primero, falla rápido) ────────────
  smoke:
    name: Smoke — Dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Smoke tests
        run: npx playwright test tests/smoke/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report-dev
          path: playwright-report/
          retention-days: 7

  # ── JOB 2: Suite completa E2E (Chromium + Firefox + WebKit) ─────────────
  e2e-full:
    name: E2E — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' || github.event.inputs.suite == 'e2e-only' }}
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install ${{ matrix.project }} --with-deps

      - name: Start mock VAST server
        run: npx ts-node mock-vast/server.ts &

      - name: Wait for VAST server
        run: npx wait-on http://localhost:9999/health --timeout 15000

      - name: E2E tests
        run: npx playwright test tests/e2e/ --project=${{ matrix.project }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

  # ── JOB 3: Integration tests (solo Chromium, necesitan mock VAST) ────────
  integration:
    name: Integration — Chromium
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps

      - name: Start mock VAST server
        run: npx ts-node mock-vast/server.ts &
      - name: Wait for VAST server
        run: npx wait-on http://localhost:9999/health --timeout 15000

      - name: Integration tests
        run: npx playwright test tests/integration/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 4: Accessibility ─────────────────────────────────────────────────
  accessibility:
    name: Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test tests/a11y/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 5: Visual Regression ─────────────────────────────────────────────
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test tests/visual/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff
          path: test-results/
          retention-days: 14

  # ── JOB 6: Performance / QoE (solo Lunes) ────────────────────────────────
  performance:
    name: QoE Metrics
    runs-on: ubuntu-latest
    needs: smoke
    # Solo corre los lunes para no generar ruido diario
    if: ${{ github.event_name == 'schedule' && startsWith(github.event.schedule, '0 12 * * 1') }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test tests/performance/ --project=performance

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qoe-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

  # ── Notificación de resultados ────────────────────────────────────────────
  notify-results:
    name: Notificar Resultados
    runs-on: ubuntu-latest
    needs: [smoke, e2e-full, integration, accessibility, visual]
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Evaluar resultado global
        run: |
          if [[ "${{ needs.smoke.result }}" == "failure" || "${{ needs.e2e-full.result }}" == "failure" ]]; then
            echo "❌ Tests FALLARON en ambiente DEV"
            echo "RESULT=failure" >> $GITHUB_ENV
          else
            echo "✅ Tests PASARON en ambiente DEV"
            echo "RESULT=success" >> $GITHUB_ENV
          fi

      # TODO: Agregar notificación a Slack/Teams/Email cuando se configure
      # - name: Notificar Slack
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: '{"text": "QA Dev: ${{ env.RESULT }}"}'

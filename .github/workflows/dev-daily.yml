name: Dev — Suite Completa (Diario + Push)

# ─── Cuándo corre y qué jobs ───────────────────────────────────────────────
#
#  TRIGGER            smoke  integration  e2e  a11y  visual  perf
#  ─────────────────────────────────────────────────────────────────
#  PR → main          ✅     ✅            —    —     —       —
#  push → main        ✅     —             —    —     —       —
#  schedule (L-V)     ✅     ✅            ✅   ✅    ✅      lunes
#  workflow_dispatch  ✅     full          full full  full    —
#
#  PR: smoke + integration dan feedback pre-merge en ~5-7 min.
#  push a main: solo smoke (la suite completa ya validó el PR).
#  schedule: suite completa diaria contra develop del player.

on:
  pull_request:
    branches: [main]        # Smoke + integration en cada PR (feedback pre-merge)
  schedule:
    - cron: '0 12 * * 1-5'  # 7 AM Colombia, Lunes a Viernes
  push:
    branches: [main]        # Solo smoke post-merge (ya validado en PR)
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a correr'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - e2e-only
          - smoke-only

env:
  PLAYER_ENV: dev
  MOCK_VAST_PORT: 9999
  MOCK_VAST_BASE_URL: http://localhost:9999
  PLATFORM_API_URL: https://dev.platform.mediastre.am/api
  CI: true

jobs:
  # ── JOB 1: Smoke rápido (siempre corre primero, falla rápido) ────────────
  smoke:
    name: Smoke — Dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: sudo apt-get install -y ffmpeg

      - name: Smoke tests
        run: npx playwright test tests/smoke/ --project=chromium
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report-dev
          path: playwright-report/
          retention-days: 7

  # ── JOB 2: Suite completa E2E (Chromium + Firefox + WebKit) ─────────────
  e2e-full:
    name: E2E — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' || github.event.inputs.suite == 'e2e-only' }}
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.project }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install ${{ matrix.project }} --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.project }}

      - name: E2E tests
        run: npx playwright test tests/e2e/ --project=${{ matrix.project }}
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

  # ── JOB 3: Integration tests (solo Chromium, necesitan mock VAST) ────────
  integration:
    name: Integration — Chromium
    runs-on: ubuntu-latest
    needs: smoke
    # Corre en PRs (feedback pre-merge) y en schedule completo.
    # No en push a main: ya fue validado en el PR correspondiente.
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: sudo apt-get install -y ffmpeg

      - name: Integration tests
        run: npx playwright test tests/integration/ --project=chromium
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 4: Accessibility ─────────────────────────────────────────────────
  accessibility:
    name: Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npx playwright test tests/a11y/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 5: Visual Regression ─────────────────────────────────────────────
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - run: npx playwright test tests/visual/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-diff
          path: test-results/
          retention-days: 14

  # ── JOB 6: Performance / QoE (diario L-V + workflow_dispatch full) ──────────
  performance:
    name: QoE Metrics
    runs-on: ubuntu-latest
    needs: smoke
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright + deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run performance tests
        run: npx playwright test tests/performance/ --project=performance
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      # Compara contra baseline commiteado. Falla el job si alguna métrica
      # empeoró > 20% respecto al baseline. Si el baseline está vacío (primera
      # ejecución), el script hace exit 0 y no bloquea CI.
      # Para actualizar el baseline: npm run perf:update-baseline + commit.
      - name: Compare against performance baseline
        run: npm run perf:compare

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qoe-report-${{ github.run_number }}
          path: |
            playwright-report/
            perf-results/current-run.json
          retention-days: 30

  # ── Notificación de resultados ────────────────────────────────────────────
  notify-results:
    name: Notificar Resultados
    runs-on: ubuntu-latest
    needs: [smoke, integration, accessibility, visual, performance]
    if: always() && github.event_name == 'schedule'
    steps:
      - name: Evaluar resultado global
        run: |
          SMOKE="${{ needs.smoke.result }}"
          INTEGRATION="${{ needs.integration.result }}"
          PERFORMANCE="${{ needs.performance.result }}"
          ACCESSIBILITY="${{ needs.accessibility.result }}"
          VISUAL="${{ needs.visual.result }}"

          if [[ "$SMOKE" == "failure" || "$INTEGRATION" == "failure" || "$PERFORMANCE" == "failure" ]]; then
            echo "RESULT=failure" >> $GITHUB_ENV
            echo "ICON=❌" >> $GITHUB_ENV
          else
            echo "RESULT=success" >> $GITHUB_ENV
            echo "ICON=✅" >> $GITHUB_ENV
          fi

          echo "SMOKE_R=$SMOKE"           >> $GITHUB_ENV
          echo "INTEGRATION_R=$INTEGRATION" >> $GITHUB_ENV
          echo "PERFORMANCE_R=$PERFORMANCE" >> $GITHUB_ENV
          echo "ACCESSIBILITY_R=$ACCESSIBILITY" >> $GITHUB_ENV
          echo "VISUAL_R=$VISUAL"         >> $GITHUB_ENV

      - name: Notificar Slack
        if: ${{ secrets.SLACK_WEBHOOK != '' }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          STATUS_EMOJI() { [[ "$1" == "success" ]] && echo "✅" || [[ "$1" == "skipped" ]] && echo "⏭️" || echo "❌"; }
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"${{ env.ICON }} *QA Dev — Suite Diaria* (<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_number }}>)\",
              \"attachments\": [{
                \"color\": \"$([ '${{ env.RESULT }}' = 'success' ] && echo 'good' || echo 'danger')\",
                \"fields\": [
                  {\"title\": \"Smoke\",        \"value\": \"${{ env.SMOKE_R }}\",        \"short\": true},
                  {\"title\": \"Integration\",  \"value\": \"${{ env.INTEGRATION_R }}\",  \"short\": true},
                  {\"title\": \"A11y\",         \"value\": \"${{ env.ACCESSIBILITY_R }}\",\"short\": true},
                  {\"title\": \"Visual\",       \"value\": \"${{ env.VISUAL_R }}\",       \"short\": true},
                  {\"title\": \"Performance\",  \"value\": \"${{ env.PERFORMANCE_R }}\",  \"short\": true}
                ]
              }]
            }"

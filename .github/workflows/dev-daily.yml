name: Dev — Gate Diario (L-V) · Suite Completa on-demand

# ─── Cuándo corre y qué jobs ───────────────────────────────────────────────
#
#  TRIGGER              contract  smoke  integration  e2e   a11y visual perf
#  ──────────────────────────────────────────────────────────────────────────
#  PR → main            ✅        ✅     ✅            —     —    —      —
#  push → main          ✅        ✅     —             —     —    —      —
#  schedule diario L-V  ✅        ✅     @critical     —     —    —      —
#  workflow_dispatch    ✅        full   full          full  full full   full
#
#  PR: contract → smoke → integration (~5-7 min feedback pre-merge).
#  push a main: contract + smoke.
#  schedule L-V (cron '0 12 * * 1-5'): GATE DIARIO — contract + smoke + integration
#    @critical (lo crítico que no puede fallar, ~10 min). NO corre la suite completa.
#  La suite completa (e2e cross-browser + integration full + a11y + visual + perf)
#  solo corre bajo demanda con workflow_dispatch suite=full.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * 1-5'  # Lunes a Viernes 7 AM Colombia — gate diario (contract+smoke+@critical)
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a correr'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - e2e-only
          - smoke-only

env:
  PLAYER_ENV: dev
  MOCK_VAST_PORT: 9999
  MOCK_VAST_BASE_URL: http://localhost:9999
  PLATFORM_API_URL: https://dev.platform.mediastre.am/api
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Permisos para publicar el reporte HTML a GitHub Pages (job publish-report).
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── JOB 1: Contract tests (siempre, gate antes de smoke) ─────────────────
  contract:
    name: Contract — API Shape
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      summary: ${{ steps.summary.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
          # fixtures default 'true': algunos contract tests cargan media HLS real
          # (waitForEvent 'loadedmetadata') y necesitan los streams locales en :9001.
          # setup-qa cachea los fixtures, así que solo la 1ª corrida paga la generación.
      - name: Contract tests
        run: npx playwright test tests/contract/ --project=contract
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - name: Summary
        id: summary
        if: always()
        run: |
          if [ -f playwright-report/report.json ]; then
            P=$(jq -r '.stats.expected // 0' playwright-report/report.json)
            F=$(jq -r '.stats.unexpected // 0' playwright-report/report.json)
            echo "summary=$P/$((P+F))" >> "$GITHUB_OUTPUT"
          else
            echo "summary=—" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: contract-report
          path: playwright-report/
          retention-days: 7

  # ── JOB 2: Smoke rápido (falla rápido, gate para el resto) ───────────────
  smoke:
    name: Smoke — Dev
    runs-on: ubuntu-latest
    needs: contract
    timeout-minutes: 20
    outputs:
      summary: ${{ steps.summary.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - name: Smoke tests
        run: npx playwright test tests/smoke/ --project=chromium
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - name: Summary
        id: summary
        if: always()
        run: |
          if [ -f playwright-report/report.json ]; then
            P=$(jq -r '.stats.expected // 0' playwright-report/report.json)
            F=$(jq -r '.stats.unexpected // 0' playwright-report/report.json)
            echo "summary=$P/$((P+F))" >> "$GITHUB_OUTPUT"
          else
            echo "summary=—" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report-dev
          path: playwright-report/
          retention-days: 7

  # ── JOB 3: Suite completa E2E (Chromium + Firefox + WebKit, 2 shards c/u) ─────
  e2e-full:
    name: E2E — ${{ matrix.project }} ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    # Suite completa E2E: solo bajo demanda (dispatch full | e2e-only). NO en ningún cron.
    if: ${{ github.event.inputs.suite == 'full' || github.event.inputs.suite == 'e2e-only' }}
    strategy:
      fail-fast: false
      matrix:
        # project × shard: cada browser se divide en 2 shards paralelos (6 jobs).
        # El job más lento (webkit ~25min) baja a ~13min al partirse en 2.
        project: [chromium, firefox, webkit]
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: ${{ matrix.project }}
      - name: E2E tests
        run: npx playwright test tests/e2e/ --project=${{ matrix.project }} --shard=${{ matrix.shard }}/2
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ matrix.project }}-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

  # ── JOB 3b: Integration CRÍTICO (gate diario L-V) — solo @critical ──────────
  # El gate diario rápido: contract + smoke + integration @critical (~pocos tests).
  # "Lo que no puede fallar". Agregar/quitar @critical en los specs para ajustar.
  integration-critical:
    name: Integration — @critical (daily)
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 12
    outputs:
      summary: ${{ steps.summary.outputs.summary }}
    # NO-BLOQUEANTE: corre informativo. Hoy estos tests de media son inestables
    # (timing) — se reportan en Slack pero no marcan el daily en rojo. Cuando se
    # estabilicen (validar en CI limpio), quitar continue-on-error para hacerlo gate.
    continue-on-error: true
    # Corre en el cron diario (L-V) Y en cualquier workflow_dispatch, para poder
    # validar el gate crítico bajo demanda (sin esperar al cron).
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - name: Integration tests (@critical)
        # --workers=1: el gate crítico carga media (HLS/DASH/IMA). Con workers>1 dos
        # sesiones de media se pisan y tests estables fallan por contención (no por bug).
        # Serial garantiza confiabilidad ("no puede fallar") a costa de ~5-6 min.
        run: npx playwright test tests/integration/ --project=chromium --grep "@critical" --workers=1
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - name: Summary
        id: summary
        if: always()
        run: |
          if [ -f playwright-report/report.json ]; then
            P=$(jq -r '.stats.expected // 0' playwright-report/report.json)
            F=$(jq -r '.stats.unexpected // 0' playwright-report/report.json)
            echo "summary=$F fallos / $P ok" >> "$GITHUB_OUTPUT"
          else
            echo "summary=—" >> "$GITHUB_OUTPUT"
          fi
      # Subir SIEMPRE (no solo en fallo): publish-report lo usa como reporte de
      # Pages en el gate diario, cuando integration-merge (suite completa) no corre.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-critical-report
          path: playwright-report/
          retention-days: 7

  # ── JOB 4: Integration completo (PRs + dispatch full, 4 shards) ─────────────
  integration:
    name: Integration — Shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    needs: smoke
    # Suite completa de integration: NO en el cron diario (ese usa integration-critical).
    # Solo PR o dispatch full (la suite completa ya no corre en ningún cron).
    # 4 shards paralelos: ~512 tests / 4 ≈ ~10 min por shard (vs ~20 con 2 shards).
    timeout-minutes: 15
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.suite == 'full' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - name: Integration tests (shard ${{ matrix.shard }}/4)
        # Excluye @analytics (youbora: 94 tests con beacons reales a youboranqs01.com,
        # lentos y dependientes de red). NO se ejecutan en el daily — correrlos manualmente
        # cuando se necesite validar analytics: npx playwright test tests/integration/youbora.spec.ts
        run: npx playwright test tests/integration/ --project=chromium --grep-invert "@analytics" --shard=${{ matrix.shard }}/4 --reporter=blob
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-report-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  # ── JOB 4b: Merge integration shard reports ──────────────────────────────
  integration-merge:
    name: Integration — Merge Reports
    runs-on: ubuntu-latest
    needs: integration
    # Solo si integration realmente corrió (no en push, donde se saltea y no hay blobs).
    if: ${{ always() && (needs.integration.result == 'success' || needs.integration.result == 'failure') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v4
        with:
          pattern: integration-report-shard-*
          path: all-blob-reports
          merge-multiple: true
      - run: npx playwright merge-reports --reporter=html ./all-blob-reports
      - uses: actions/upload-artifact@v4
        with:
          name: integration-report-merged
          path: playwright-report/
          retention-days: 14

  # ── JOB 4c: Publicar reporte HTML en GitHub Pages ────────────────────────────
  # Publica a GH Pages el mejor reporte disponible:
  #   • suite completa (PR / dispatch full) → reporte merged de integration.
  #   • gate diario (cron L-V)              → reporte de integration @critical.
  # Así el link de Pages (y el de Slack) SIEMPRE refleja el run del día.
  # Requiere: Settings → Pages → Source = "GitHub Actions" (una vez).
  publish-report:
    name: Publicar Reporte (GH Pages)
    runs-on: ubuntu-latest
    needs: [integration-critical, integration-merge]
    if: ${{ always() && (needs.integration-merge.result == 'success' || needs.integration-critical.result == 'success') }}
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # Preferir el reporte merged (suite completa). continue-on-error: en el daily
      # no existe y el paso falla sin abortar el job.
      - id: dl-merged
        uses: actions/download-artifact@v4
        with:
          name: integration-report-merged
          path: report
        continue-on-error: true
      # Fallback: reporte de @critical (gate diario), solo si no hubo merged.
      - id: dl-critical
        if: ${{ steps.dl-merged.outcome != 'success' }}
        uses: actions/download-artifact@v4
        with:
          name: integration-critical-report
          path: report
      - uses: actions/upload-pages-artifact@v3
        with:
          path: report
      - id: deploy
        uses: actions/deploy-pages@v4

  # ── JOB 5: Accessibility ─────────────────────────────────────────────────
  accessibility:
    name: Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15
    # Solo en la suite COMPLETA bajo demanda: dispatch full (ya no corre en ningún cron).
    if: ${{ github.event.inputs.suite == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - run: npx playwright test tests/a11y/ --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 6: Visual Regression (schedule + workflow_dispatch) ───────────────
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    # Solo en la suite COMPLETA bajo demanda: dispatch full (ya no corre en ningún cron).
    if: ${{ github.event.inputs.suite == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - run: npx playwright test tests/visual/ --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-diff
          path: test-results/
          retention-days: 14

  # ── JOB 7: Performance / QoE (schedule + workflow_dispatch full) ──────────
  performance:
    name: QoE Metrics
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    # Solo en la suite COMPLETA bajo demanda: dispatch full (ya no corre en ningún cron).
    if: ${{ github.event.inputs.suite == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - name: Run performance tests
        run: npx playwright test tests/performance/ --project=performance
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - name: Compare against performance baseline
        run: npm run perf:compare
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qoe-report-${{ github.run_number }}
          path: |
            playwright-report/
            perf-results/current-run.json
          retention-days: 30

  # ── Notificación de resultados (schedule diario + dispatch) ────────────────
  notify-results:
    name: Notificar Resultados
    runs-on: ubuntu-latest
    needs: [contract, smoke, integration-critical, integration, integration-merge, e2e-full, accessibility, visual, performance]
    # Notifica en cron (schedule) y también en workflow_dispatch (para validar el flujo Slack bajo demanda).
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_BATTERY_WEBHOOK_URL }}
    steps:
      - name: Notificar Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_TEST_BATTERY_WEBHOOK_URL }}
          CONTRACT_R: ${{ needs.contract.result }}
          SMOKE_R: ${{ needs.smoke.result }}
          CRIT_R: ${{ needs.integration-critical.result }}
          INTEGRATION_R: ${{ needs.integration.result }}
          E2E_R: ${{ needs.e2e-full.result }}
          A11Y_R: ${{ needs.accessibility.result }}
          VISUAL_R: ${{ needs.visual.result }}
          PERF_R: ${{ needs.performance.result }}
          CONTRACT_S: ${{ needs.contract.outputs.summary }}
          SMOKE_S: ${{ needs.smoke.outputs.summary }}
          CRIT_S: ${{ needs.integration-critical.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUM: ${{ github.run_number }}
          PAGES_URL: https://jurrego1771.github.io/lightning-player-qa/
        run: |
          [ -z "$SLACK_WEBHOOK" ] && exit 0
          # Veredicto: bloqueantes = contract + smoke + (en completo) integration/e2e/visual/perf.
          # integration-critical NO entra (es informativo).
          VERDICT="PASÓ"; TITLE_ICON="✅"
          for r in "$CONTRACT_R" "$SMOKE_R" "$INTEGRATION_R" "$E2E_R" "$VISUAL_R" "$PERF_R" "$A11Y_R"; do
            [ "$r" = "failure" ] && { VERDICT="FALLÓ"; TITLE_ICON="❌"; }
          done

          # Fields solo de jobs que corrieron (no skipped), sin iconos por job.
          FIELDS=""
          addf() {
            local label="$1" res="$2" val="$3"
            [ -z "$res" ] || [ "$res" = "skipped" ] && return
            [ -z "$val" ] && val="$res"
            [ -n "$FIELDS" ] && FIELDS="$FIELDS,"
            FIELDS="$FIELDS{\"type\":\"mrkdwn\",\"text\":\"*$label*\n$val\"}"
          }
          addf "Contract" "$CONTRACT_R" "$CONTRACT_S"
          addf "Smoke" "$SMOKE_R" "$SMOKE_S"
          addf "Integration" "$INTEGRATION_R" ""
          addf "E2E" "$E2E_R" ""
          addf "A11y" "$A11Y_R" ""
          addf "Visual" "$VISUAL_R" ""
          addf "Performance" "$PERF_R" ""

          # Línea informativa de @critical (si corrió).
          CRIT_BLOCK=""
          if [ -n "$CRIT_R" ] && [ "$CRIT_R" != "skipped" ]; then
            CRIT_BLOCK=",{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"*Integration @critical* (informativo, no bloquea): ${CRIT_S:-$CRIT_R}\"}}"
          fi

          curl -s -X POST "$SLACK_WEBHOOK" -H "Content-Type: application/json" -d @- <<EOF
          {
            "blocks": [
              {"type":"header","text":{"type":"plain_text","text":"⚡ Lightning Suite Daily — $VERDICT $TITLE_ICON","emoji":true}},
              {"type":"section","text":{"type":"mrkdwn","text":"rama \`develop\` · gate diario"}},
              {"type":"divider"},
              {"type":"section","fields":[$FIELDS]}$CRIT_BLOCK,
              {"type":"divider"},
              {"type":"context","elements":[{"type":"mrkdwn","text":"<$PAGES_URL|📊 Ver reporte HTML ↗>  ·  <$RUN_URL|run #$RUN_NUM>"}]}
            ]
          }
          EOF

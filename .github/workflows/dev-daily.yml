name: Dev — Suite Completa (Diario + Push)

# ─── Cuándo corre y qué jobs ───────────────────────────────────────────────
#
#  TRIGGER              contract  smoke  integration  e2e            a11y visual perf
#  ──────────────────────────────────────────────────────────────────────────────────
#  PR → main            ✅        ✅     ✅            —              —    —      —
#  push → main          ✅        ✅     —             —              —    —      —
#  schedule LIGERO M-V  ✅        ✅     ✅            chromium       —    —      —
#  schedule COMPLETA L  ✅        ✅     ✅            chr+ff+webkit  ✅   ✅     ✅
#  workflow_dispatch    ✅        full   full          full           full full   full
#
#  PR: contract → smoke → integration (~5-7 min feedback pre-merge).
#  push a main: contract + smoke (suite completa ya validó el PR).
#  schedule Mar-Vie (cron '0 12 * * 2-5'): ligero — solo chromium (e2e+integration).
#  schedule Lunes   (cron '0 12 * * 1'):   completa — cross-browser + a11y + visual + perf.
#  El split por cron usa github.event.schedule para diferenciar ligero vs completo.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * 2-5'  # Mar-Vie 7 AM Colombia — diario ligero (chromium)
    - cron: '0 12 * * 1'    # Lunes 7 AM Colombia — suite completa (cross-browser + perf)
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite a correr'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - e2e-only
          - smoke-only

env:
  PLAYER_ENV: dev
  MOCK_VAST_PORT: 9999
  MOCK_VAST_BASE_URL: http://localhost:9999
  PLATFORM_API_URL: https://dev.platform.mediastre.am/api
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── JOB 1: Contract tests (siempre, gate antes de smoke) ─────────────────
  contract:
    name: Contract — API Shape
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
          # fixtures default 'true': algunos contract tests cargan media HLS real
          # (waitForEvent 'loadedmetadata') y necesitan los streams locales en :9001.
          # setup-qa cachea los fixtures, así que solo la 1ª corrida paga la generación.
      - name: Contract tests
        run: npx playwright test tests/contract/ --project=contract
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: contract-report
          path: playwright-report/
          retention-days: 7

  # ── JOB 2: Smoke rápido (falla rápido, gate para el resto) ───────────────
  smoke:
    name: Smoke — Dev
    runs-on: ubuntu-latest
    needs: contract
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - name: Smoke tests
        run: npx playwright test tests/smoke/ --project=chromium
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-report-dev
          path: playwright-report/
          retention-days: 7

  # ── JOB 3: Suite completa E2E (Chromium + Firefox + WebKit) ─────────────
  e2e-full:
    name: E2E — ${{ matrix.project }}
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 30
    if: ${{ github.event_name == 'schedule' || github.event.inputs.suite == 'full' || github.event.inputs.suite == 'e2e-only' }}
    strategy:
      fail-fast: false
      matrix:
        # Cross-browser solo en la suite COMPLETA (Lunes / dispatch full|e2e-only).
        # En el cron LIGERO (Mar-Vie) corre solo chromium.
        project: ${{ (github.event.schedule == '0 12 * * 1' || github.event.inputs.suite == 'full' || github.event.inputs.suite == 'e2e-only') && fromJSON('["chromium","firefox","webkit"]') || fromJSON('["chromium"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: ${{ matrix.project }}
      - name: E2E tests
        run: npx playwright test tests/e2e/ --project=${{ matrix.project }}
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

  # ── JOB 4: Integration tests (PRs + schedule, solo Chromium, 2 shards) ──────
  integration:
    name: Integration — Shard ${{ matrix.shard }}/2
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 12
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event.inputs.suite == 'full' }}
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - name: Integration tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test tests/integration/ --project=chromium --shard=${{ matrix.shard }}/2 --reporter=blob
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-report-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 14

  # ── JOB 4b: Merge integration shard reports ──────────────────────────────
  integration-merge:
    name: Integration — Merge Reports
    runs-on: ubuntu-latest
    needs: integration
    # Solo si integration realmente corrió (no en push, donde se saltea y no hay blobs).
    if: ${{ always() && (needs.integration.result == 'success' || needs.integration.result == 'failure') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v4
        with:
          pattern: integration-report-shard-*
          path: all-blob-reports
          merge-multiple: true
      - run: npx playwright merge-reports --reporter=html ./all-blob-reports
      - uses: actions/upload-artifact@v4
        with:
          name: integration-report-merged
          path: playwright-report/
          retention-days: 14

  # ── JOB 5: Accessibility ─────────────────────────────────────────────────
  accessibility:
    name: Accessibility (WCAG 2.1 AA)
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 15
    # Solo en la suite COMPLETA: cron del Lunes ('0 12 * * 1') o dispatch full.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1') || github.event.inputs.suite == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - run: npx playwright test tests/a11y/ --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: playwright-report/
          retention-days: 14

  # ── JOB 6: Visual Regression (schedule + workflow_dispatch) ───────────────
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    # Solo en la suite COMPLETA: cron del Lunes ('0 12 * * 1') o dispatch full.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1') || github.event.inputs.suite == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - run: npx playwright test tests/visual/ --project=chromium
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-diff
          path: test-results/
          retention-days: 14

  # ── JOB 7: Performance / QoE (schedule + workflow_dispatch full) ──────────
  performance:
    name: QoE Metrics
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 20
    # Solo en la suite COMPLETA: cron del Lunes ('0 12 * * 1') o dispatch full.
    if: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 12 * * 1') || github.event.inputs.suite == 'full' }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-qa
        with:
          browser: chromium
      - name: Run performance tests
        run: npx playwright test tests/performance/ --project=performance
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}
      - name: Compare against performance baseline
        run: npm run perf:compare
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qoe-report-${{ github.run_number }}
          path: |
            playwright-report/
            perf-results/current-run.json
          retention-days: 30

  # ── Notificación de resultados (solo schedule) ────────────────────────────
  notify-results:
    name: Notificar Resultados
    runs-on: ubuntu-latest
    needs: [smoke, integration, integration-merge, e2e-full, accessibility, visual, performance]
    if: always() && github.event_name == 'schedule'
    env:
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
    steps:
      - name: Evaluar resultado global
        run: |
          SMOKE="${{ needs.smoke.result }}"
          INTEGRATION="${{ needs.integration.result }}"
          E2E="${{ needs.e2e-full.result }}"
          VISUAL="${{ needs.visual.result }}"
          PERFORMANCE="${{ needs.performance.result }}"
          ACCESSIBILITY="${{ needs.accessibility.result }}"

          if [[ "$SMOKE" == "failure" || "$INTEGRATION" == "failure" || "$PERFORMANCE" == "failure" || "$E2E" == "failure" || "$VISUAL" == "failure" ]]; then
            echo "RESULT=failure" >> $GITHUB_ENV
            echo "ICON=❌" >> $GITHUB_ENV
          else
            echo "RESULT=success" >> $GITHUB_ENV
            echo "ICON=✅" >> $GITHUB_ENV
          fi

          echo "SMOKE_R=$SMOKE"             >> $GITHUB_ENV
          echo "INTEGRATION_R=$INTEGRATION" >> $GITHUB_ENV
          echo "E2E_R=$E2E"                 >> $GITHUB_ENV
          echo "VISUAL_R=$VISUAL"           >> $GITHUB_ENV
          echo "PERFORMANCE_R=$PERFORMANCE" >> $GITHUB_ENV
          echo "ACCESSIBILITY_R=$ACCESSIBILITY" >> $GITHUB_ENV

      - name: Notificar Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          [ -z "$SLACK_WEBHOOK" ] && exit 0
          STATUS_EMOJI() { [[ "$1" == "success" ]] && echo "✅" || [[ "$1" == "skipped" ]] && echo "⏭️" || echo "❌"; }
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"${{ env.ICON }} *QA Dev — Suite Diaria* (<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|Run #${{ github.run_number }}>)\",
              \"attachments\": [{
                \"color\": \"$([ '${{ env.RESULT }}' = 'success' ] && echo 'good' || echo 'danger')\",
                \"fields\": [
                  {\"title\": \"Smoke\",        \"value\": \"${{ env.SMOKE_R }}\",        \"short\": true},
                  {\"title\": \"Integration\",  \"value\": \"${{ env.INTEGRATION_R }}\",  \"short\": true},
                  {\"title\": \"E2E\",          \"value\": \"${{ env.E2E_R }}\",          \"short\": true},
                  {\"title\": \"Visual\",       \"value\": \"${{ env.VISUAL_R }}\",       \"short\": true},
                  {\"title\": \"A11y\",         \"value\": \"${{ env.ACCESSIBILITY_R }}\",\"short\": true},
                  {\"title\": \"Performance\",  \"value\": \"${{ env.PERFORMANCE_R }}\",  \"short\": true}
                ]
              }]
            }"

name: Update Visual Baselines (manual)

# Genera/actualiza los baselines de screenshot EN el runner de CI (ubuntu-latest)
# y los commitea de vuelta a la rama. Es la forma correcta de capturar baselines:
# en el mismo entorno donde el job `visual` los compara.
#
# Se dispara en cada push a la rama de trabajo (mientras se calibran baselines).
# El commit que genera lleva "[skip ci]" para no entrar en bucle.
# Quitar el trigger `push` antes de mergear a main.

on:
  push:
    branches: [ci/optimize-dev-daily-suite]

permissions:
  contents: write

jobs:
  update-baselines:
    name: Generar baselines linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci

      - run: npx playwright install chromium --with-deps
      - run: sudo apt-get install -y ffmpeg
      - run: npm run fixtures:generate

      # --update-snapshots regenera/crea los *-chromium-linux.png faltantes.
      # continue-on-error: un test que no llega al screenshot (p.ej. bug en el
      # setup) no debe impedir commitear los baselines que sí se generaron.
      - name: Update snapshots
        continue-on-error: true
        run: npx playwright test tests/visual/ --project=chromium --update-snapshots
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      # Baseline de performance capturado EN CI: bufferedAhead_sec depende del
      # CPU/red del runner, así un baseline local (win) nunca coincide. Se corre
      # el perf en el runner y se actualiza el baseline para que sea comparable.
      - name: Regenerar baseline de performance (en CI)
        continue-on-error: true
        run: |
          npx playwright test tests/performance/ --project=performance
          npm run perf:update-baseline
        env:
          PLATFORM_API_TOKEN: ${{ secrets.PLATFORM_API_TOKEN }}

      - name: Commit & push baselines
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/ performance-baseline/
          if git diff --cached --quiet; then
            echo "No hay cambios en baselines."
          else
            git commit -m "chore(visual): generar baselines linux en CI [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

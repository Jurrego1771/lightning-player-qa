module: youbora
criticality: medium
last_reviewed: "2026-06-06"

paths:
  - "src/analytics/youbora/"
  - "src/plugins/index.js"
  - "src/analytics/README.md"

depends_on:
  - events
  - plugins
  - platform-config

depended_by: []

breaks_if_changed:
  - "La activación del tracking Youbora deja de depender de metadata.player.tracking.youbora.enabled"
  - "account_code no se propaga al tracker y no se generan beacons NPAW"
  - "Los cambios de contenido no reinician o actualizan la sesión correctamente"
  - "Los eventos de pausa, buffering y ad break dejan de reflejarse en los beacons"
  - "La integración con npaw-plugin deja de ser silenciosa cuando falta configuración"

test_suites_required:
  - integration
  - e2e

negative_cases:
  - "tracking.youbora ausente → no se inicializa el plugin y no se emiten beacons"
  - "enabled=true pero account_code ausente → no se generan beacons de sesión"
  - "SDK NPAW no disponible o red bloqueada → la reproducción continúa sin crash"
  - "load() con mismo id/type/account_code → no reinicia la sesión"
  - "destroy() antes de contentFirstPlay → no aparecen beacons /start ni /joinTime"

external_dependencies:
  - "npaw-plugin"
  - "NPAW collector / LMA endpoints"
  - "Dominios *.npaw.com y *.youbora.com"


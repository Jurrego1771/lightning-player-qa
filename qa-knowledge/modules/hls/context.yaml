module: hls
criticality: high
last_reviewed: "2026-06-05"

paths:
  - "src/player/handler/hls/"

depends_on:
  - events
  - state
  - platform-config
  - playback-core

depended_by:
  - ads-sgai
  - quality-selector

breaks_if_changed:
  - "Stream HLS VOD no inicia reproducción"
  - "Stream HLS Live no reproduce o queda en buffering permanente"
  - "ABR deja de funcionar (niveles no cambian automáticamente)"
  - "DVR seekable window no es correcto"
  - "Custom pLoader de SGAI deja de funcionar (roto si handler.js cambia)"
  - "Segmento 404 no tiene retry automático y falla inmediatamente"
  - "EXT-X-DISCONTINUITY causa crash del player"

test_suites_required:
  - integration
  - e2e

negative_cases:
  - "Segmento 404 → retry 3 veces, luego error fatal"
  - "Manifest inválido → error fatal, player recoverable"
  - "Nivel solicitado inexistente → fallback al nivel más cercano"
  - "EXT-X-DISCONTINUITY en stream → player no crashea"
  - "Live stream con baja latencia (LL-HLS) → reproducción sin buffering excesivo"

external_dependencies:
  - "hls.js 1.6.13"

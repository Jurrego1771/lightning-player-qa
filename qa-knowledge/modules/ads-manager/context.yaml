module: ads-manager
criticality: high
last_reviewed: "2026-06-05"

paths:
  - "src/ads/manager/"
  - "src/ads/api.js"

depends_on:
  - events
  - state
  - platform-config

depended_by:
  - ads-ima
  - ads-dai
  - ads-sgai
  - ads-adswizz
  - controls-api

breaks_if_changed:
  - "Config con ads.type 'ima' inicializa el sistema incorrecto"
  - "VAST 3.0 con Wrapper chain no resuelto correctamente"
  - "Ad system no disponible → reproducción de content bloqueada (no graceful degradation)"
  - "adsManager.play() y adsManager.pause() no delegan correctamente"
  - "adInfo.isLinear incorrecto → Controls.isPlayingAd() retorna valor erróneo"

test_suites_required:
  - integration
  - e2e

negative_cases:
  - "ads.map = null → player reproduce content sin ads, no crash"
  - "VAST endpoint devuelve XML inválido → adsError, content continúa"
  - "Ad system no disponible → graceful degradation, content reproduce"
  - "VMAP con mid-roll → ad insertado en timestamp correcto"

external_dependencies:
  - "VAST/VMAP endpoint"
  - "Google IMA SDK (si ads.type === 'ima')"

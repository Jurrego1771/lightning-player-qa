module: plugins
criticality: critical
last_reviewed: "2026-06-05"

paths:
  - "src/plugins/index.js"

depends_on:
  - events
  - state
  - platform-config

depended_by:
  - api-bootstrap
  - analytics-streammetrics
  - analytics-comscore
  - analytics-ga4
  - analytics-reactions
  - youbora
  - ads-ima
  - ads-dai
  - ads-sgai
  - ads-adswizz

breaks_if_changed:
  - "Plugin mal registrado rompe todos los plugins subsiguientes"
  - "Orden de inicialización de plugins cambia → analytics recibe eventos antes de que el player esté listo"
  - "Lazy loading de plugins falla → módulo de ads no disponible"

test_suites_required:
  - contract

negative_cases:
  - "Plugin no disponible (CDN fail) → player carga sin el plugin, no crash"
  - "Plugin con error de inicialización → otros plugins no se ven afectados"

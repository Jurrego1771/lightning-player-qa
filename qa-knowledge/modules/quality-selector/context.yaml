module: quality-selector
criticality: medium
last_reviewed: "2026-06-05"

paths:
  - "src/player/handler/hls/"
  - "src/controls/"

depends_on:
  - hls
  - events
  - state

depended_by: []

breaks_if_changed:
  - "player.level=-1 no habilita ABR"
  - "player.level=N no fija el nivel de calidad"
  - "player.levels no retorna los niveles del manifest"
  - "levelchange / levelchanged no se emiten al cambiar nivel"

test_suites_required:
  - e2e
  - performance

negative_cases:
  - "player.level en stream DASH → no-op silencioso"
  - "player.level con valor mayor a max disponible → fallback al nivel máximo"
  - "ABR en stream sin múltiples niveles → player.level permanece en 0"

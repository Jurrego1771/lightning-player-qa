module: ads-ima
criticality: high
last_reviewed: "2026-06-05"

paths:
  - "src/ads/googleIma/"

depends_on:
  - events
  - state
  - ads-manager
  - platform-config

depended_by: []

breaks_if_changed:
  - "beacons OMID (impression, firstQuartile, midpoint, thirdQuartile, complete) no se disparan"
  - "Eventos de lifecycle de IMA no se emiten en el orden correcto"
  - "Content no reanuda después de ad break"
  - "VAST vacío (0 ads) no es manejado gracefully — player crashea"
  - "IMA SDK CDN falla y bloquea la reproducción de content"

test_suites_required:
  - integration
  - e2e

negative_cases:
  - "VAST endpoint responde 500 → adsError emitido, reproducción de content continúa"
  - "IMA SDK CDN falla → reproducción continúa sin ads, no crash"
  - "VAST vacío (0 ads) → adsError o adsAllAdsCompleted inmediato, content continúa"
  - "VAST Wrapper chain de 3 niveles → resuelto correctamente"
  - "Ad con duración < 3s → adsComplete emitido (bug conocido: BUG-IMA-001)"

external_dependencies:
  - "Google IMA SDK 3.x (imasdk.googleapis.com)"
  - "VAST/VMAP endpoint"
  - "OMID SDK (medición)"

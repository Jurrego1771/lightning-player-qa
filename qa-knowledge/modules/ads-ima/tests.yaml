version: "1.0"
module: ads-ima
last_updated: "2026-06-08"

existing_tests:

  - spec_file: "tests/integration/ads-ima-error.spec.ts"
    description: |
      Error handling del sistema IMA. Cubre: VAST vacío → content continúa (AC-002),
      IMA SDK CDN bloqueado → content sin ads sin crash (AC-003), beacons de tracking
      se disparan exactamente una vez por evento (AC-004).
    ac_coverage:
      - "IMA-AC-002"
      - "IMA-AC-003"
      - "IMA-AC-004"
      - "IMA-AC-005"

  - spec_file: "tests/e2e/ads-ima-tag-params.spec.ts"
    description: |
      Verifica que el player envía parámetros correctos en las requests IMA a
      pubads.g.doubleclick.net. Cubre: vpmute=0/1 según volumen inicial, vpmute hereda
      estado de sesión en mid-roll y post-roll (VMAP), vpa=auto con autoplay, vis=1
      cuando visible, u_so landscape/portrait. Solo Chromium.
    ac_coverage:
      - "IMA-AC-001"
      - "IMA-AC-012"
      - "IMA-AC-013"

  - spec_file: "tests/integration/ads-manager-degradation.spec.ts"
    description: |
      Tests de degradación del ads-manager cuando IMA falla. Verifica que el player
      continúa funcionando normalmente cuando el sistema de ads está degradado.
    ac_coverage:
      - "IMA-AC-003"
      - "IMA-AC-005"

coverage_gaps:

  - id: GAP-IMA-001
    priority: MUST
    ac_ref: "IMA-AC-001"
    title: "Secuencia completa de eventos IMA en happy path (pre-roll 15s con mock VAST)"
    suggested_spec: "tests/integration/ads-ima-lifecycle.spec.ts"
    notes: |
      No existe un test que verifique el orden EXACTO de todos los eventos del ciclo IMA
      con mock-vast local. El test en ads-ima-tag-params.spec.ts verifica parámetros pero
      no el ciclo de eventos. Usar adBeaconInterceptor + waitForFunction para capturar
      la secuencia completa: adsRequested → adsLoaded → adsContentPauseRequested →
      adsStarted → adsImpression → adsFirstQuartile → adsMidpoint → adsThirdQuartile →
      adsComplete → adsAllAdsCompleted → adsContentResumeRequested.
    industry_note: "El orden de los eventos IMA es crítico — un player que emite en orden incorrecto puede causar discrepancias en reportes de ad servers."

  - id: GAP-IMA-002
    priority: MUST
    ac_ref: "IMA-AC-006"
    title: "Volumen del ad sincronizado con el volumen del player (setVolume)"
    suggested_spec: "tests/integration/ads-ima-volume.spec.ts"
    notes: |
      Verificar que adsManager.setVolume() recibe el volumen del player en initialize()
      y que cambios de volumen durante el ad se propagan. Requiere interceptar la API
      del adsManager o escuchar adsVolumeChanged.
    industry_note: "Volumen desincronizado es una queja común de usuarios en players con VMAP."

  - id: GAP-IMA-003
    priority: MUST
    ac_ref: "IMA-AC-007"
    title: "Seeking bloqueado durante reproducción de ad"
    suggested_spec: "tests/integration/ads-ima-lifecycle.spec.ts"
    notes: |
      Verificar que player.currentTime = X durante isPlayingAd === true no tiene efecto.
      AdsHandler.set() debe retornar null para prop === 'currentTime' cuando isPlayingAd.
    industry_note: "Permitir seek durante ads viola las políticas de la mayoría de los ad servers."

  - id: GAP-IMA-004
    priority: MUST
    ac_ref: "IMA-AC-008"
    title: "Skip ad después de skipOffset — adsSkipped emitido, content reanuda"
    suggested_spec: "tests/integration/ads-ima-skip.spec.ts"
    notes: |
      Testear con mock-vast que incluya skipOffset en el VAST XML. Llamar player.ad.skip()
      después de skipOffset segundos. Verificar adsSkipped + contenido reanuda desde
      la posición correcta. Incluir el path de discardAdBreak (600ms de espera).
    industry_note: "Skip es uno de los casos más críticos para UX y compliance con políticas de ad servers."

  - id: GAP-IMA-005
    priority: SHOULD
    ac_ref: "IMA-AC-010"
    title: "VMAP mid-roll: ad interrumpe y reanuda en posición correcta"
    suggested_spec: "tests/integration/ads-ima-vmap.spec.ts"
    notes: |
      Requiere VMAP fixture en mock-vast con mid-roll en t=10s (usar contenido corto para
      no esperar 30s). Verificar: player.ad.cuePoints contiene el cue point, ciclo IMA
      completo se emite, player.currentTime después de adsContentResumeRequested ≈ t=10s
      (±1s por parseInt).

  - id: GAP-IMA-006
    priority: SHOULD
    ac_ref: "IMA-AC-009"
    title: "Skip antes del skipOffset no tiene efecto"
    suggested_spec: "tests/integration/ads-ima-skip.spec.ts"
    notes: |
      Verificar que player.ad.skip() antes del skipOffset no emite adsSkipped y el ad
      continúa. Verificar player.ad.info.skippable === false antes del offset.

  - id: GAP-IMA-007
    priority: SHOULD
    ac_ref: "IMA-AC-014"
    title: "Contenido tipo 'audio' — ad renderizado en video fallback element"
    suggested_spec: "tests/integration/ads-ima-audio-type.spec.ts"
    notes: |
      Verificar que con type='audio' el componente monta el elemento <video> fallback
      y que el AdDisplayContainer usa ese elemento. Puede requerir verificar el DOM
      o interceptar la inicialización del AdDisplayContainer.

  - id: GAP-IMA-008
    priority: SHOULD
    ac_ref: "IMA-AC-015"
    title: "Reset del sistema de ads al cargar nuevo contenido — sin eventos duplicados"
    suggested_spec: "tests/integration/ads-ima-reset.spec.ts"
    notes: |
      Cargar contenido A con ads → esperar pre-roll → cargar contenido B con ads.
      Verificar que los eventos del contenido A no aparecen en el capture de eventos
      del contenido B. Verificar que isPlayingAd es false entre los dos contenidos.

  - id: GAP-IMA-009
    priority: SHOULD
    ac_ref: "IMA-AC-011"
    title: "Post-roll se reproduce después de que el contenido termina"
    suggested_spec: "tests/integration/ads-ima-vmap.spec.ts"
    notes: |
      Requiere contenido corto y VMAP con post-roll. Llegar al final del contenido y
      verificar que AdsLoader.contentComplete() triggerea el post-roll. Testear también
      el caso de post-roll vacío (IMA-DEF-006).

  - id: GAP-IMA-010
    priority: COULD
    ac_ref: "IMA-AC-016"
    title: "Ad blocker bloquea VAST URL — content reproduce sin ads"
    suggested_spec: "tests/integration/ads-ima-adblocker.spec.ts"
    notes: |
      Usar page.route() para bloquear el VAST endpoint (no el SDK). Verificar que
      adsError se emite y el content reproduce normalmente. Distinguir del caso
      donde el SDK mismo está bloqueado (GAP ya cubierto por AC-003).

  # ── OVERLAY ADS (NonLinear) ───────────────────────────────────────────────

existing_tests_overlay:

  - spec_file: "tests/e2e/ads-ima-overlay-behavior.spec.ts"
    description: |
      Tests E2E de comportamiento básico del overlay nonlinear IMA.
      Basados en observaciones directas via MCP QA (2026-06-22) sobre content 6a3946726e0d2c90d67907a9:
      VAST request sz=480x70 confirmado, video playing durante overlay confirmado.
      Cubre: VAST request se dispara (AC-018), video no pausa (AC-017 / BR-IMA-OVL-001),
      overlay aparece en primeros 30s (overlayPosition=0), sin crash durante sesión.
    ac_coverage:
      - "IMA-AC-017"
      - "IMA-AC-018"
    notes: "Solo Chromium. Usa ContentIds.vodWithOverlay (6a3946726e0d2c90d67907a9). Sin pre-requisitos de setup."

  - spec_file: "tests/integration/ads-ima-macro-resolution.spec.ts"
    description: |
      Resolución de macros en VAST URL de pre-roll/overlay usando mock VAST server.
      Cubre: $cust_params$, $listenerid$, $without_cookies$, $markers$, $random-number$,
      macros desconocidas, múltiples macros en una URL, VAST 404 no crashea (BR-IMA-004).
      Estrategia: page.route() intercepta la request al mock server, verifica searchParams.
    ac_coverage:
      - "IMA-AC-018"

  - spec_file: "tests/integration/ads-ima-overlay-macro-resolution.spec.ts"
    description: |
      Resolución de macros en el flujo OverlayAds usando mock environment (isolatedPlayer).
      Cubre: nuevas props (custom, listenerId, withoutCookies) no crashean el player,
      metadata.adMarkers ausente usa destructuring default, load() con nuevas props
      no rompe árbol React, compatibilidad hacia atrás sin las nuevas props.
      LIMITACIÓN: No puede verificar el VAST URL del overlay directamente (BLOQUEADOR-1).
    ac_coverage:
      - "IMA-AC-019"
      - "IMA-AC-022"

  - spec_file: "tests/e2e/ads-ima-overlay-macro-e2e.spec.ts"
    description: |
      E2E con plataforma real (dev). Carga el media fixture con overlay ad configurado
      (6a36f0857896eb99d5beffc9), intercepta la request a pubads.g.doubleclick.net
      con sz=480x70 (nonlinear), verifica que $custom.tag_custom$ se resolvió a "web".
      También verifica que el pre-roll no se rompió (regresión de adsRequest.js).
      Requiere: npx ts-node scripts/setup-overlay-ad-fixture.ts ejecutado previamente.
    ac_coverage:
      - "IMA-AC-017"
      - "IMA-AC-018"

coverage_gaps_overlay:

  - id: GAP-IMA-OVL-001
    priority: MUST
    ac_ref: "IMA-AC-017"
    title: "Overlay no pausa el video — verificación de currentTime durante overlay activo"
    suggested_spec: "tests/e2e/ads-ima-overlay-behavior.spec.ts"
    status: "COVERED"
    notes: |
      Cubierto en ads-ima-overlay-behavior.spec.ts (test 2):
      - Detecta la request VAST del overlay (sz=480x70)
      - Mide video.paused === false y currentTime avanza en 3s
      Pendiente: verificar que adsContentPauseRequested NO se emite (requiere exponer evento IMA).
    industry_ref: "BR-IMA-OVL-001 / IAB VAST 3.0 §3.5"

  - id: GAP-IMA-OVL-002
    priority: SHOULD
    ac_ref: "IMA-AC-020"
    title: "overlayPosition=N — overlay aparece al alcanzar N segundos (no antes)"
    suggested_spec: "tests/e2e/ads-ima-overlay-position.spec.ts"
    notes: |
      Requiere un media fixture con overlayPosition > 0 (ej: 30s). Verificar que no hay
      request a pubads nonlinear antes de los 30s, y sí la hay después. Usa expect.poll()
      sobre el array de requests capturadas. Depende de disponer de un content fixture
      con overlayPosition configurado en la plataforma.

  - id: GAP-IMA-OVL-003
    priority: SHOULD
    ac_ref: "IMA-AC-021"
    title: "Error en overlay VAST (404) — contenido sigue reproduciendo sin crash"
    suggested_spec: "tests/integration/ads-ima-overlay-macro-resolution.spec.ts (ampliar)"
    notes: |
      Existe cobertura parcial via BR-IMA-004 test en ads-ima-macro-resolution.spec.ts
      (Suite 6, último test). Pero ese test usa el flujo de adsMap, no el flujo de
      overlay (overlayAds.jsx). Necesita un test dedicado que use el fixture de overlay
      real y mockee la respuesta del VAST con 404 — verificar que el video sigue y no hay
      crash. Actualmente bloqueado por BLOQUEADOR-1 (no hay fixture de overlay en mock env).

  - id: GAP-IMA-OVL-004
    priority: COULD
    ac_ref: "IMA-AC-022"
    title: "Overlay no se monta si ads.overlay no está configurado — sin request nonlinear"
    suggested_spec: "tests/integration/ads-ima-overlay-macro-resolution.spec.ts"
    notes: |
      Verificar que con isolatedPlayer sin overlay URL configurado, no hay request a
      ningún ad server nonlinear. Uso de page.route() para interceptar cualquier request
      a pubads y verificar que sz=480x70 nunca aparece. Cobertura parcial ya existe
      (tests de compatibilidad hacia atrás en el spec de overlay).

coverage_gaps:
  - id: GAP-PLAY-001
    priority: MUST
    ac_ref: "PLAY-AC-009"
    title: "play() antes de ready: test real sin limitación de harness"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "Actualmente test.fixme. Requiere uno de: (a) hook __preReadyPlayer en harness, (b) test de iframe sin harness que llame play() en el mismo tick que loadMSPlayer(), o (c) mock de la API que permita obtener instancia antes de ready."
    industry_note: "Crítico para la robustez del player: si un integrador llama play() en el callback de loadMSPlayer() (antes del .then()), el player debe fallar graciosamente."

  - id: GAP-PLAY-002
    priority: MUST
    ac_ref: "PLAY-AC-016"
    title: "destroy() durante buffering: no hay memory leak ni error"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "El test de ciclo de vida en vod-playback.spec.ts cubre destroy() en estado pausado/listo. Falta cubrir destroy() específicamente durante el estado buffering (simulable con throttling de red y stream lento)."
    industry_note: "Patrón común en SPAs: el usuario navega durante un buffering. Video.js tuvo leaks en este escenario específico."

  - id: GAP-PLAY-003
    priority: MUST
    ac_ref: "PLAY-AC-010"
    title: "Autoplay policy: muted autoplay funciona en Chromium headless"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "Verificar que muted autoplay (volume: 0) siempre funciona en CI headless. Documentar que autoplay con audio requiere MEI o interacción. Crear test explícito de muted autoplay vs. autoplay con audio."
    industry_note: "Crítico para plataformas OTT que dependen de autoplay. Chrome autoplay policy puede cambiar con versiones del browser."

  - id: GAP-PLAY-004
    priority: MUST
    ac_ref: "PLAY-AC-013"
    title: "loop: true — el contenido se repite sin emitir ended"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "No hay test que verifique loop: true. El contenido debe reiniciarse automáticamente al llegar al final. El NativeHandler tiene el flag _alreadyEmittedEnded que se resetea en loadedmetadata — necesita verificar interacción con loop."
    industry_note: "Común en backgrounds de video y reproductores de radio. El spec HTML5 define que ended se emite incluso con loop, pero la reproducción continúa."

  - id: GAP-PLAY-005
    priority: SHOULD
    ac_ref: "PLAY-AC-015"
    title: "buffering event: se emite y status cambia a 'buffering' bajo condiciones de red limitadas"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "Requiere throttling de red via CDP o Playwright networkConditions. El estado 'buffering' es fundamental para analytics (Youbora) pero no tiene test directo en playback-core."
    industry_note: "El buffering rate es una métrica clave de QoE en OTT. La industria recomienda testear bajo simulación de 3G (750 kbps)."

  - id: GAP-PLAY-006
    priority: SHOULD
    ac_ref: "PLAY-AC-002"
    title: "Orden de eventos con autoplay: true — loaded → ready → playing en orden estricto"
    suggested_spec: "tests/contract/api-bootstrap.spec.ts"
    notes: "Los tests existentes verifican que los eventos se emiten pero no verifican rigurosamente el orden temporal. Un test de orden estricto debe registrar timestamps de eventos y verificar precedencia."
    industry_note: "Race conditions en el orden de eventos son una fuente común de bugs en players complejos. La industria usa event sequence validators."

  - id: GAP-PLAY-007
    priority: SHOULD
    ac_ref: "PLAY-AC-011"
    title: "Handler selection: DASH correctamente detectado y sourceType === 'native'"
    suggested_spec: "tests/e2e/dash-playback.spec.ts"
    notes: "dash-playback.spec.ts existe pero puede no verificar explícitamente player.sourceType === 'native' y la ausencia de propiedades ABR. Agregar assertions específicas para comportamiento DASH vs HLS."

  - id: GAP-PLAY-008
    priority: SHOULD
    ac_ref: "PLAY-AC-005"
    title: "ended event — BUG-001: seek a posición 0 no emite 'seeking'"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "BUG-PLAYBACK-001 está documentado pero no tiene test que lo regrese. Un regression test debe verificar explícitamente que seek(0) solo emite 'seeked' sin 'seeking', para detectar si el bug se 'resuelve' accidentalmente en una actualización del browser o del player."
    industry_note: "Behavior depende del browser. Documentar el comportamiento actual como expected para evitar falsos positivos en CI."

  - id: GAP-PLAY-009
    priority: COULD
    ac_ref: "PLAY-AC-017"
    title: "playbackRate setter: cambio de velocidad funciona y emite ratechange"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "La propiedad playbackRate está en _exposeMethods como writable. Sin test explícito. Relevante para integradores que implementan controles de velocidad."

  - id: GAP-PLAY-010
    priority: COULD
    ac_ref: "PLAY-AC-001"
    title: "player.readyState refleja estado HTML5 estándar durante ciclo de vida"
    suggested_spec: "tests/integration/playback-core-edge.spec.ts"
    notes: "readyState es expuesto como propiedad pero no hay test que verifique sus valores (0-4) en los momentos correctos del ciclo de vida. Útil para integradores que implementan lógica basada en readyState."
    industry_note: "readyState HAVE_ENOUGH_DATA (4) es el estado mínimo para reproducción confiable según el spec WHATWG."

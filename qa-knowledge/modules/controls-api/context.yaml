module: controls-api
criticality: critical
last_reviewed: "2026-06-05"

paths:
  - "src/controls/index.js"
  - "src/controls/methods.js"

depends_on:
  - events
  - state
  - ads-manager

depended_by:
  - api-bootstrap
  - playback-core

breaks_if_changed:
  - "player.play() / player.pause() no responden o arrojan error inesperado"
  - "Firma de play(), pause(), load(), destroy() cambia — integraciones externas rotas"
  - "player.currentTime setter no ejecuta seek"
  - "player.paused getter retorna valor incorrecto"
  - "play() no espera viewReady → crash race condition"
  - "pause() durante ad no pausa el ad — ads ignoran la llamada"

test_suites_required:
  - contract
  - e2e

negative_cases:
  - "play() antes de ready → throw Error 'Player is not ready', no crash"
  - "pause() antes de ready → throw Error 'Player is not ready', no crash"
  - "play() llamado múltiples veces simultáneamente → solo una ejecución (guard _calledPlaying)"
  - "player.volume fuera de rango [0,1] → clampeado silenciosamente"
  - "player.seek(-1) → seek a 0"

external_dependencies: []

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightning Player QA Harness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    #player-container { width: 100%; max-width: 1280px; aspect-ratio: 16/9; }
    #harness-error { color: #f55; font-family: monospace; padding: 20px; display: none; }
  </style>
</head>
<body>
  <div id="player-container"></div>
  <div id="harness-error"></div>

  <script>
    // ── Sistema de tracking interno ──────────────────────────────────────────
    // Almacena estado observable por Playwright via page.evaluate()

    window.__qa = {
      ready: false,
      initialized: false,  // true solo cuando .then() terminó completamente
      events: [],          // lista de nombres de eventos disparados
      eventData: {},       // último payload por evento
      errors: [],          // errores capturados
      initError: null,     // error de inicialización
    }

    // ── Método principal de inicialización ───────────────────────────────────
    //
    // Usa loadMSPlayer() — la API oficial del Lightning Player.
    // Retorna una Promise que resuelve con la instancia del player.
    //
    // Métodos de inicialización soportados (doc: lightning_player.md):
    //   1. loadMSPlayer(containerId, config) → Promise<player>   ← PRIORIDAD
    //   2. Script tag con data-loaded callback
    //   3. Script tag con playerloaded event
    //
    // Este harness implementa el método 1 como primario.

    // Retorna una Promise — goto() la espera para garantizar que los listeners
    // estén registrados antes de que el test empiece a polling window.__qa.events
    window.__initPlayer = function (config) {
      if (typeof loadMSPlayer === 'undefined') {
        var msg = '[harness] loadMSPlayer no está definido. El script del player no cargó correctamente.'
        console.error(msg)
        window.__qa.initError = msg
        document.getElementById('harness-error').textContent = msg
        document.getElementById('harness-error').style.display = 'block'
        return Promise.reject(new Error(msg))
      }

      return loadMSPlayer('player-container', config)
        .then(function (player) {
          // ── Exponer instancia al Page Object ──────────────────────────────
          window.__player = player

          // ── Suscribir todos los eventos conocidos ─────────────────────────
          var CUSTOM_EVENTS = [
            'loaded', 'ready', 'sourcechange', 'error', 'buffering',
            'programdatetime', 'adblockerDetected', 'share',
            'levelchange', 'levelchanged',
            'metadataloading', 'metadataloaded', 'metadatachanged',
            'dismissButton',
          ]

          var HTML5_EVENTS = [
            'abort', 'canplay', 'canplaythrough', 'durationchange', 'emptied',
            'ended', 'loadeddata', 'loadedmetadata', 'loadstart',
            'pause', 'play', 'playing', 'progress', 'ratechange',
            'seeked', 'seeking', 'stalled', 'suspend', 'timeupdate',
            'volumechange', 'waiting',
          ]

          var AD_EVENTS = [
            'adsAdBreakReady', 'adsAdMetadata', 'adsAllAdsCompleted',
            'adsClick', 'adsComplete', 'adsContentPauseRequested',
            'adsContentResumeRequested', 'adsDurationChange',
            'adsFirstQuartile', 'adsImpression', 'adsLinearChanged',
            'adsLoaded', 'adsLog', 'adsMidpoint', 'adsPaused',
            'adsResumed', 'adsSkippableStateChanged', 'adsSkipped',
            'adsStarted', 'adsThirdQuartile', 'adsTimeUpdate',
            'adsUserClose', 'adsVolumeChanged', 'adsVolumeMuted',
            'adsError', 'adsAdBuffering', 'adsAdProgress',
            'adsInteraction', 'adsVideoClicked', 'adsVideoIconClicked',
          ]

          var TRACK_EVENTS = [
            'texttrackchange', 'texttrackaddtrack', 'texttrackremovetrack',
            'audiotrackchange', 'audiotrackaddtrack', 'audiotrackremovetrack',
          ]

          var ALL_EVENTS = CUSTOM_EVENTS.concat(HTML5_EVENTS, AD_EVENTS, TRACK_EVENTS)

          ALL_EVENTS.forEach(function (eventName) {
            player.on(eventName, function (data) {
              // timeupdate se dispara muy seguido — solo registrar la primera vez
              if (eventName === 'timeupdate') {
                if (!window.__qa.events.includes('timeupdate')) {
                  window.__qa.events.push('timeupdate')
                }
                return
              }
              window.__qa.events.push(eventName)
              if (data !== undefined) {
                window.__qa.eventData[eventName] = data
              }

              // El evento 'ready' marca al player como listo
              if (eventName === 'ready') {
                window.__qa.ready = true
              }

              // Capturar errores
              if (eventName === 'error') {
                window.__qa.errors.push(data || { message: 'unknown error' })
              }
            })
          })

          // ── Backfill de eventos ya disparados antes de registrar listeners ─
          // Con streams locales y autoplay, el player puede estar playing antes
          // de que esta Promise resuelva. Sintetizamos los estados actuales.
          // Backfill play/playing si el player ya está corriendo cuando resuelve la Promise.
          // Condición extendida: incluye !player.paused para capturar autoplay donde
          // currentTime puede ser 0 aún pero play ya se disparó.
          if (player.status === 'playing' || player.status === 'buffering' || !player.paused) {
            if (!window.__qa.events.includes('playing')) window.__qa.events.push('playing')
            if (!window.__qa.events.includes('play'))    window.__qa.events.push('play')
          }
          if (player.readyState >= 3) {
            if (!window.__qa.events.includes('canplay')) window.__qa.events.push('canplay')
          }
          if (player.readyState >= 1) {
            if (!window.__qa.events.includes('loadedmetadata')) window.__qa.events.push('loadedmetadata')
            if (!window.__qa.events.includes('canplay')) window.__qa.events.push('canplay')
          }
          // loaded y metadataloaded son eventos custom que el player siempre emite
          // antes de que la Promise resuelva (durante la carga de config de plataforma).
          // Se backfillan incondicionalmente porque player.readyState no está expuesto.
          if (!window.__qa.events.includes('loaded')) window.__qa.events.push('loaded')
          if (!window.__qa.events.includes('metadataloaded')) window.__qa.events.push('metadataloaded')
          // Backfill error si el player inicializó en estado de error
          // (el evento 'error' puede dispararse durante la carga de config, antes de que
          // esta Promise resuelva, por lo que el listener no lo captura a tiempo)
          if (player.status === 'error' || window.__qa.errors.length > 0) {
            if (!window.__qa.events.includes('error')) window.__qa.events.push('error')
          }

          // El player siempre está en estado ready cuando la Promise resuelve
          window.__qa.ready = true
          if (!window.__qa.events.includes('ready')) window.__qa.events.push('ready')

          // ── Flag de inicialización completa ───────────────────────────────
          // DEBE ser la última línea del .then() para evitar race conditions.
          // goto() espera este flag antes de retornar al test.
          window.__qa.initialized = true
        })
        .catch(function (err) {
          var msg = '[harness] Error en loadMSPlayer: ' + (err && err.message ? err.message : String(err))
          console.error(msg, err)
          window.__qa.initError = msg
          window.__qa.errors.push({ message: msg })
          if (!window.__qa.events.includes('error')) window.__qa.events.push('error')
          document.getElementById('harness-error').textContent = msg
          document.getElementById('harness-error').style.display = 'block'
        })
    }

    // ── Método secundario: load() dinámico ──────────────────────────────────
    // Permite cargar nuevo contenido en un player ya inicializado.
    // Requiere: { type, id }
    window.__loadContent = function (options) {
      if (!window.__player) {
        console.error('[harness] No hay instancia de player. Llamar __initPlayer primero.')
        return Promise.reject(new Error('Player not initialized'))
      }
      return window.__player.load(options)
    }
  </script>
</body>
</html>
